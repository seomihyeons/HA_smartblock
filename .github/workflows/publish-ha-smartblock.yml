name: Publish HA SmartBlock Add-on

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ha_smartblock/**"
      - ".github/workflows/publish-ha-smartblock.yml"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read add-on version
        id: addon
        run: |
          VERSION="$(sed -n 's/^version:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}$/\1/p' ha_smartblock/config.yaml | head -n 1)"
          if [ -z "$VERSION" ]; then
            echo "Failed to read version from ha_smartblock/config.yaml" >&2
            exit 1
          fi
          OWNER="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/${OWNER}/ha_smartblock" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: ./ha_smartblock
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BUILD_VERSION=${{ steps.addon.outputs.version }}
          tags: |
            ${{ steps.addon.outputs.image }}:${{ steps.addon.outputs.version }}
            ${{ steps.addon.outputs.image }}:latest
