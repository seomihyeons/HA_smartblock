<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HA Smart Block - Security PoC</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #1e1e1e;
            color: #d4d4d4;
        }
        h1 {
            color: #4fc3f7;
            border-bottom: 2px solid #4fc3f7;
            padding-bottom: 10px;
        }
        .section {
            margin: 30px 0;
            padding: 20px;
            background: #2d2d2d;
            border-left: 4px solid #4fc3f7;
        }
        button {
            background: #4fc3f7;
            color: #1e1e1e;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: monospace;
            font-size: 14px;
            margin: 5px;
        }
        button:hover {
            background: #0288d1;
        }
        .result {
            margin-top: 15px;
            padding: 15px;
            background: #1e1e1e;
            border: 1px solid #4fc3f7;
            white-space: pre-wrap;
            font-size: 13px;
        }
        .danger {
            border-color: #f44336;
            color: #f44336;
        }
        .success {
            border-color: #4caf50;
            color: #4caf50;
        }
        code {
            background: #1e1e1e;
            padding: 2px 6px;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <h1>HA Smart Block Security PoC</h1>
    
    <div class="section">
        <h2>Test 1: Token Exposure</h2>
        <p>Attempts to extract API token from global scope</p>
        <button onclick="testToken()">Run Test</button>
        <div id="token-result" class="result" style="display:none;"></div>
    </div>
    
    <div class="section">
        <h2>Test 2: XSS Vulnerability</h2>
        <p>Demonstrates unsafe innerHTML usage</p>
        <button onclick="testXSS()">Run Test</button>
        <div id="xss-result" class="result" style="display:none;"></div>
    </div>
    
    <div class="section">
        <h2>Test 3: Prototype Pollution</h2>
        <p>Tests Object.prototype manipulation</p>
        <button onclick="testPollution()">Run Test</button>
        <div id="pollution-result" class="result" style="display:none;"></div>
    </div>
    
    <script>
        function testToken() {
            const result = document.getElementById('token-result');
            result.style.display = 'block';
            
            if (typeof __HA_TOKEN__ !== 'undefined') {
                result.className = 'result danger';
                result.textContent = 
                    'VULNERABLE: Token exposed\n\n' +
                    'Token: ' + __HA_TOKEN__ + '\n\n' +
                    'Impact: Full Home Assistant access';
            } else {
                result.className = 'result success';
                result.textContent = 
                    'SECURE: Token not found in global scope';
            }
        }
        
        function testXSS() {
            const result = document.getElementById('xss-result');
            result.style.display = 'block';
            
            const testDiv = document.createElement('div');
            testDiv.style.display = 'none';
            
            try {
                testDiv.innerHTML = '<img src=x onerror="window.xssTriggered=true">';
                document.body.appendChild(testDiv);
                
                setTimeout(() => {
                    if (window.xssTriggered) {
                        result.className = 'result danger';
                        result.textContent = 
                            'VULNERABLE: XSS payload executed\n\n' +
                            'Impact: Script injection possible';
                    } else {
                        result.className = 'result success';
                        result.textContent = 'SECURE: XSS blocked';
                    }
                    testDiv.remove();
                }, 100);
            } catch (e) {
                result.className = 'result success';
                result.textContent = 'SECURE: XSS blocked by browser';
            }
        }
        
        function testPollution() {
            const result = document.getElementById('pollution-result');
            result.style.display = 'block';
            
            const before = {}.polluted;
            
            try {
                Object.prototype.polluted = 'test';
                const after = {}.polluted;
                
                delete Object.prototype.polluted;
                
                result.className = 'result danger';
                result.textContent = 
                    'VULNERABLE: Prototype pollution possible\n\n' +
                    'Before: ' + before + '\n' +
                    'After:  ' + after + '\n\n' +
                    'Impact: Global object manipulation';
            } catch (e) {
                result.className = 'result success';
                result.textContent = 
                    'SECURE: Prototype is frozen or protected';
            }
        }
    </script>
</body>
</html>
