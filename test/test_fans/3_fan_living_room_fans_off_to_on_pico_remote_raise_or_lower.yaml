- alias: Fan - Living Room Fans Off to On Pico Remote Raise or Lower
  id: 'fan_living_room_fans_off_to_on_pico_remote_raise_or_lower'

  triggers:
    - trigger: event
      event_type: lutron_caseta_button_event
      event_data:
        serial: 49229391
        button_number: 5
        action: press
    - trigger: event
      event_type: lutron_caseta_button_event
      event_data:
        serial: 49229391
        button_number: 6
        action: press

  conditions:
    - condition: state
      entity_id: fan.living_room_fans
      state: 'off'

  actions:
    - delay:
        seconds: 1
    - action: fan.turn_on
      target:
        entity_id:
          - fan.living_room_east
          - fan.living_room_west
    - delay:
        seconds: 1
