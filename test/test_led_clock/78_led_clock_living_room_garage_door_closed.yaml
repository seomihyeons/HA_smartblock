- alias: LED Clock - Living Room Garage Door Closed
  id: led_clock_living_room_garage_door_closed
  triggers:
  - trigger: state
    entity_id: cover.garage_door
    from: open
    to: closed
  conditions:
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.living_room_clock
    state: 'on'
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/notify
      payload: '{  "icon": "garage_close", "pushIcon": 0, "duration": 30, "color":
        [0,255,0], "stack": false, "text": "Garage Closed" }'
