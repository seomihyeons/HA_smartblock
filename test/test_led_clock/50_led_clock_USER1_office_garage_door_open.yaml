- alias: LED Clock - USER1's Office Garage Door Open
  id: led_clock_USER1_office_garage_door_open
  triggers:
  - trigger: state
    entity_id: cover.garage_door
    from: closed
    to: open
  conditions:
  - condition: state
    entity_id: person.USER1
    state: home
  - condition: state
    entity_id: light.USER1s_office_desktop_clock
    state: 'on'
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/notify
      payload: '{  "icon": "garage_open", "pushIcon": 0, "duration": 30, "color":
        [255,0,0], "text": "Garage Open" }'
