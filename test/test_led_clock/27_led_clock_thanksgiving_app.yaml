- alias: LED Clock - Thanksgiving App
  id: led_clock_thanksgiving_app
  triggers:
  - trigger: time
    at: 09:30:00
  - trigger: state
    entity_id: input_select.holiday
    to: Thanksgiving
  conditions:
  - condition: state
    entity_id: input_select.holiday
    state: Thanksgiving
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/holiday
      payload: "{  \"icon\": \"thanksgiving\", \"pushIcon\": 0, \"repeat\": 3, \"\
        text\": [\n  {\n    \"t\": \"Happy \",\n    \"c\": \"FFD700\"\n  },\n  {\n\
        \    \"t\": \"Thanksgiving\",\n    \"c\": \"8B4513\"\n  }\n] }"
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/holiday
      payload: "{  \"icon\": \"thanksgiving\", \"pushIcon\": 0, \"repeat\": 3, \"\
        text\": [\n  {\n    \"t\": \"Happy \",\n    \"c\": \"FFD700\"\n  },\n  {\n\
        \    \"t\": \"Thanksgiving\",\n    \"c\": \"8B4513\"\n  }\n] }"
