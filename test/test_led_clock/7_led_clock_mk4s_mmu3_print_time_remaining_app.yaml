- alias: LED Clock - MK4S MMU3 Print Time Remaining App
  id: led_clock_mk4s_mmu3_print_time_remaining_app
  triggers:
  - trigger: state
    entity_id: sensor.prusa_mk4s_mmu3_progress
  conditions:
  - condition: state
    entity_id: sensor.prusa_mk4s_mmu3
    state: printing
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/mk4s_mmu3_time_remaining
      payload: '{  "icon": "clock", "pushIcon": 2, "color": [255,98,0], "repeat":
        3, "text": "MMU: {{ relative_time(now() - timedelta( seconds = as_timestamp(states(''sensor.prusa_mk4s_mmu3_print_finish''))
        - as_timestamp(now()))) }}" }'
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/mk4s_mmu3_time_remaining
      payload: '{  "icon": "clock", "pushIcon": 2, "color": [255,98,0], "repeat":
        3, "text": "MMU: {{ relative_time(now() - timedelta( seconds = as_timestamp(states(''sensor.prusa_mk4s_mmu3_print_finish''))
        - as_timestamp(now()))) }}" }'
