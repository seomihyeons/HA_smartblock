- alias: LED Clock - USER1's Office Apple TV Music Title
  id: led_clock_USER1_office_music_title_apple_tv
  triggers:
  - trigger: state
    entity_id: media_player.USER1_s_office_apple_tv
    attribute: media_title
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions:
  - condition: state
    entity_id: media_player.USER1_s_office_apple_tv
    state: playing
  - condition: state
    entity_id: media_player.USER1_s_office_apple_tv
    attribute: media_content_type
    state: music
  - condition: not
    conditions:
    - condition: state
      entity_id: select.USER1_s_office_tv_activities
      state: power_off
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/music_song
      payload: '{  "icon": "music", "pushIcon": 0, "repeat": 3, "rainbow": true, "text":
        "Song: {{ state_attr(''media_player.USER1_s_office_apple_tv'', ''media_title'')
        }}" }'
