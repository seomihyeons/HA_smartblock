- alias: LED Clock - Living Room Album Title Sonos Living Room
  id: led_clock_living_room_album_title_sonos_living_room
  triggers:
  - trigger: state
    entity_id: media_player.sonos_living_room
    attribute: media_title
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions:
  - condition: state
    entity_id: media_player.sonos_living_room
    state: playing
  - condition: state
    entity_id: media_player.sonos_living_room
    attribute: media_content_type
    state: music
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/music_album
      payload: '{  "icon": "album", "pushIcon": 2, "repeat": 3, "rainbow": true, "text":
        "Artist: {{ state_attr(''media_player.sonos_living_room'', ''media_artist'')
        }} - Album: {{ state_attr(''media_player.sonos_living_room'', ''media_album_name'')
        }}" }'
