- alias: LED Clock - Living Room Music Title Sonos Surround Sound
  id: led_clock_living_room_music_title_sonos_surround_sound
  triggers:
  - trigger: state
    entity_id: media_player.sonos_surround_sound
    attribute: media_title
  conditions:
  - condition: state
    entity_id: media_player.sonos_surround_sound
    state: playing
  - condition: state
    entity_id: media_player.sonos_surround_sound
    attribute: media_content_type
    state: music
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.sonos_surround_sound
      attribute: source_list
      state: TV
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.sonos_surround_sound
      attribute: source
      state: TV
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.sonos_surround_sound
      attribute: media_title
      state: TV
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/music_song
      payload: '{  "icon": "music", "pushIcon": 0, "repeat": 3, "rainbow": true, "text":
        "Song: {{ state_attr(''media_player.sonos_surround_sound'', ''media_title'')
        }}" }'
