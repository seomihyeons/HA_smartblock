- alias: LED Clock - Living Room Album Title Sonos Surround Sound
  id: led_clock_living_room_album_title_sonos_surround_sound
  triggers:
  - trigger: state
    entity_id: media_player.sonos_surround_sound
    attribute: media_title
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions:
  - condition: state
    entity_id: media_player.sonos_surround_sound
    state: playing
  - condition: state
    entity_id: media_player.sonos_surround_sound
    attribute: media_content_type
    state: music
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.sonos_surround_sound
      attribute: source_list
      state: TV
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.sonos_surround_sound
      attribute: source
      state: TV
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.sonos_surround_sound
      attribute: media_title
      state: TV
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/music_album
      payload: '{  "icon": "album", "pushIcon": 2, "repeat": 3, "rainbow": true, "text":
        "Artist: {{ state_attr(''media_player.sonos_surround_sound'', ''media_artist'')
        }} - Album: {{ state_attr(''media_player.sonos_surround_sound'', ''media_album_name'')
        }}" }'
