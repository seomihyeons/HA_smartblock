- alias: LED Clock - Living Room Music Title Sonos Living Room
  id: led_clock_living_room_music_title_sonos_living_room
  triggers:
  - trigger: state
    entity_id: media_player.sonos_living_room
    attribute: media_title
  conditions:
  - condition: state
    entity_id: media_player.sonos_living_room
    state: playing
  - condition: state
    entity_id: media_player.sonos_living_room
    attribute: media_content_type
    state: music
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/music_song
      payload: '{  "icon": "music", "pushIcon": 0, "repeat": 3, "rainbow": true, "text":
        "Song: {{ state_attr(''media_player.sonos_living_room'', ''media_title'')
        }}" }'
