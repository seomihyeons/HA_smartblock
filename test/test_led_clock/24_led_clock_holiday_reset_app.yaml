- alias: LED Clock - Holiday Reset App
  id: led_clock_holiday_reset_app
  triggers:
  - trigger: time
    at: 05:00:00
  conditions:
  - condition: state
    entity_id: input_select.holiday
    state: None
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/holiday
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/holiday
