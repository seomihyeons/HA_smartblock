- alias: 3D-Printer - MK4S MMU3 Off Turn Off Light
  id: 3d_printer_mk4s_mmu3_off_turn_off_light
  triggers:
  - trigger: state
    entity_id: switch.prusa_mk4s_mmu3
    to: 'off'
  conditions:
  - condition: state
    entity_id: light.prusa_mk4s_mmu3
    state: 'on'
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.prusa_mk4s_mmu3
