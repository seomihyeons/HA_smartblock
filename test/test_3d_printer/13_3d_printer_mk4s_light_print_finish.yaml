- alias: 3D-Printer - MK4S Light Print Finish
  id: 3d_printer_mk4s_light_print_finish
  triggers:
  - trigger: state
    entity_id: sensor.prusa_mk4s
    from: printing
    to: finished
  conditions:
  - condition: state
    entity_id: light.prusa_mk4s
    state: 'on'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.prusa_mk4s
    data:
      brightness_pct: 100
      color_name: green
