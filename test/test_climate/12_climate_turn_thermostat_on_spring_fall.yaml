- alias: Climate - Turn Thermostat On Spring/Fall
  id: climate_turn_thermostat_on_spring_fall
  triggers:
  - trigger: numeric_state
    entity_id: sensor.REDACTED_temperature
    below: 65
    for:
      hours: 0
      minutes: 30
      seconds: 0
  - trigger: numeric_state
    entity_id: sensor.REDACTED_temperature
    above: 82
    for:
      hours: 0
      minutes: 30
      seconds: 0
  conditions:
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: input_boolean.disable_climate
    state: 'off'
  - condition: state
    entity_id: input_boolean.thermostat_away
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: sensor.season
      state: spring
    - condition: state
      entity_id: sensor.season
      state: autumn
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  actions:
  - action: homeassistant.turn_off
    entity_id: input_boolean.thermostat_away
  - action: notify.USER1_devices
    data:
      message: Outside temp below 65 or above 78 turning On HVAC
      data:
        tag: climate
