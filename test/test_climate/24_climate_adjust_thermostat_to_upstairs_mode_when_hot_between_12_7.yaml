- alias: Climate - Adjust Thermostat to Upstairs Mode when Hot Between 12-7
  id: climate_adjust_thermostat_to_upstairs_mode_when_hot_between_12_7
  triggers:
  - trigger: numeric_state
    entity_id: sensor.REDACTED_temperature
    above: 80
    for:
      hours: 0
      minutes: 30
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.thermostat_away
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.season
      state: winter
  - condition: not
    conditions:
    - condition: state
      entity_id: climate.main_floor
      state: heat
  - condition: not
    conditions:
    - condition: state
      entity_id: climate.main_floor
      state: 'off'
  - condition: state
    entity_id: input_boolean.disable_climate
    state: 'off'
  - condition: time
    after: '12:00:00'
    before: '19:00:00'
  - condition: state
    entity_id: group.household
    state: home
  - condition: or
    conditions:
    - condition: state
      entity_id: input_boolean.USER1_office_portable_ac
      state: 'off'
    - condition: state
      entity_id: input_boolean.USER2_office_portable_ac
      state: 'off'
  actions:
  - action: climate.set_preset_mode
    data:
      entity_id: climate.main_floor
      preset_mode: Upstairs
