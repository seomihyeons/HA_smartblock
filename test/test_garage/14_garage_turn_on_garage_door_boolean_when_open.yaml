- alias: Garage - Turn On Garage Door Boolean when Open
  id: 'garage_turn_on_garage_door_boolean_when_open'

  triggers:
    - trigger: state
      entity_id: cover.garage_door
      from: 'closed'
      to: 'open'

  conditions:
    - condition: state
      entity_id: cover.garage_door
      state: 'open'

  actions:
    - action: homeassistant.turn_on
      entity_id: input_boolean.garage_door
