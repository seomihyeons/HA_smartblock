- alias: Location - Turn On Backyard Lighting when Friends Visiting
  id: 'location_turn_on_backyard_lighting_when_friends_visiting'

  triggers:
    - trigger: state
      entity_id: input_boolean.guest_mode
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
    - condition: state
      entity_id: input_boolean.disable_home_away
      state: 'off'
    - condition: time
      after: '13:00:00'
      before: '23:59:00'

  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.backyard_patio_lighting
          - switch.lower_backyard_lighting
    - action: light.turn_on
      target:
        entity_id:
          - light.backyard_patio
      data:
        brightness_pct: 10
        color_temp: 370
    - action: light.turn_on
      target:
        entity_id:
          - light.backyard_deck
      data:
        brightness_pct: 2
