- alias: Location - USER1 Away iOS Notification
  id: 'location_USER1_away_ios_notification'

  triggers:
    - trigger: state
      entity_id: person.USER1
      from: 'home'
      to: 'not_home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: USER1 Away
        data:
          tag: USER1-location
