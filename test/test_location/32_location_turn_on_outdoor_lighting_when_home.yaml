- alias: Location - Turn On Outdoor Lighting when Home
  id: 'location_turn_on_outdoor_lighting_when_home'

  triggers:
    - trigger: state
      entity_id: group.household
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: and
      conditions:
        - condition: state
          entity_id: input_boolean.disable_home_away
          state: 'off'
        - condition: state
          entity_id: sun.sun
          state: 'below_horizon'
        - condition: or
          conditions:
            - condition: state
              entity_id: input_boolean.USER1_away
              state: 'on'
            - condition: state
              entity_id: input_boolean.USER2_away
              state: 'on'

  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.backyard_patio_lighting
          - switch.lower_backyard_lighting
    - action: light.turn_on
      target:
        entity_id:
          - light.backyard_patio
      data:
        brightness_pct: 10
        color_temp: 370
    - action: light.turn_on
      target:
        entity_id:
          - light.backyard_deck
      data:
        brightness_pct: 2
