- alias: Media - Plex Stopped Lights On
  id: media_plex_stopped_lights_on
  triggers:
  - trigger: state
    entity_id: media_player.plex_living_room_appletv
    to: idle
    for:
      hours: 0
      minutes: 0
      seconds: 10
  - trigger: state
    entity_id: media_player.plex_living_room_appletv
    to: paused
    for:
      hours: 0
      minutes: 0
      seconds: 10
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_media_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.watching_plex
    state: 'on'
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.living_room_guest
    state: 'off'
  actions:
  - action: light.turn_on
    entity_id: light.living_room_lamps
    data:
      transition: 5
      color_temp: 370
      brightness_pct: 100
  - action: light.turn_on
    entity_id: light.media_center_lighting
    data:
      transition: 5
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.hallway_light
    data:
      brightness_pct: 25
  - action: light.turn_on
    target:
      entity_id:
      - light.dining_room_table
    data:
      brightness_pct: 40
  - action: light.turn_on
    target:
      entity_id:
      - light.bathroom_vanity
    data:
      brightness_pct: 40
  - action: light.turn_on
    target:
      entity_id:
      - light.kitchen_sink
    data:
      brightness_pct: 40
  - action: light.turn_on
    entity_id: light.kitchen_cabinets
    data:
      brightness_pct: 2
  - action: light.turn_on
    target:
      entity_id:
      - light.globe
    data:
      transition: 5
      brightness_pct: 65
