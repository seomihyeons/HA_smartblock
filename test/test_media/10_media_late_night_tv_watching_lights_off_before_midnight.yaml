- alias: Media - Late Night TV Watching Lights Off before Midnight
  id: media_late_night_tv_watching_lights_off_before_midnight
  triggers:
  - trigger: state
    entity_id: media_player.living_room_apple_tv
    to: playing
    for:
      hours: 0
      minutes: 0
      seconds: 30
  conditions:
  - condition: state
    entity_id: person.USER1
    state: home
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.livingroom_rainbow
    state: 'off'
  - condition: state
    entity_id: input_boolean.disable_media_lights
    state: 'off'
  - condition: time
    after: '21:30:00'
  - condition: state
    entity_id: input_boolean.watching_plex
    state: 'off'
  - condition: state
    entity_id: select.living_room_tv_activities
    state: Watch TV
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: app_id
      state: com.google.ios.youtube
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: app_name
      state: YouTube
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: app_id
      state: com.apple.TVPhotos
  - condition: state
    entity_id: input_boolean.living_room_guest
    state: 'off'
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_accent_lights
    data:
      transition: 10
  - action: light.turn_off
    target:
      entity_id:
      - light.dining_room_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.bathroom_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.hallway_light
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_ceiling_east
  - delay: 00:00:05
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_ceiling_west
  - delay: 00:00:15
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_accent_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.dining_room_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.bathroom_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.hallway_light
