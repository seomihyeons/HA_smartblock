- alias: Blinds - Turn Off Bedroom Lights when Blinds are Open
  id: 'blinds_turn_off_bedroom_lights_when_blinds_are_open'

  triggers:
    - trigger: state
      entity_id: cover.bedroom_closet_blinds
      from: 'closed'
      to: 'opening'
    - trigger: state
      entity_id: cover.bedroom_closet_blinds
      to: 'open'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_blinds
      state: 'off'
    - condition: state
      entity_id: light.bedroom_lights
      state: 'on'
    - condition: not
      conditions:
      - condition: state
        entity_id: vacuum.main_floor_roomba
        state: 'cleaning'
      - condition: state
        entity_id: vacuum.main_floor_roomba
        state: 'returning'
    - condition: not
      conditions:
      - condition: state
        entity_id: light.closet_lamp
        attribute: effect
        state: "Plantgrowth"

  actions:
    - action: light.turn_off
      entity_id:
        - light.bedroom_lights
