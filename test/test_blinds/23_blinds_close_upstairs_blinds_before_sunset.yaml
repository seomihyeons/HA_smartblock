- alias: Blinds - Close Upstairs Blinds Before Sunset
  id: 'blinds_close_upstairs_blinds_before_sunset'

  triggers:
    - trigger: sun
      event: 'sunset'
      offset: '-00:45:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_blinds
      state: 'off'
    - condition: state
      entity_id: cover.stairs_blinds
      state: 'open'

  actions:
    - action: cover.close_cover
      data:
        entity_id: 
          - cover.stairs_blinds
