- alias: Christmas - Turn on Christmas Tree When Done Playing Xbox
  trigger:
  - platform: state
    entity_id: select.living_room_tv_activities
    from: Play Xbox
    for:
      hours: 0
      minutes: 0
      seconds: 30
  condition:
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: person.USER1
    state: home
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: time
    after: '21:00:00'
    before: 05:00:00
  - condition: state
    entity_id: switch.christmas_tree
    state: 'off'
  action:
  - service: switch.turn_on
    entity_id:
    - switch.christmas_tree
