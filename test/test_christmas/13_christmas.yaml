- alias: Christmas - Plex Stopped Playing Tree On
  trigger:
  - platform: state
    entity_id: media_player.plex_living_room_appletv
    to: paused
    for:
      hours: 0
      minutes: 2
      seconds: 0
  - platform: state
    entity_id: media_player.plex_living_room_appletv
    to: idle
    for:
      hours: 0
      minutes: 2
      seconds: 0
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_media_lights
    state: 'off'
  - condition: state
    entity_id: switch.christmas_tree
    state: 'off'
  action:
  - service: switch.turn_on
    entity_id:
    - switch.christmas_tree
