- alias: Roomba - Turn Off Bedroom Lights Room Clean
  id: roomba_turn_off_bedroom_lights_room_clean
  triggers:
  - trigger: state
    entity_id: vacuum.main_floor_roomba
    to: docked
    for:
      hours: 0
      minutes: 5
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.roomba_clean_bedroom_lights
    state: 'on'
  - condition: state
    entity_id: light.bedroom_lights
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: returning
  - condition: time
    after: 08:30:00
    before: '23:00:00'
  actions:
  - action: homeassistant.turn_off
    target:
      entity_id:
      - input_boolean.roomba_clean_bedroom_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.bedroom_lamps
      - light.bedroom_ceiling
