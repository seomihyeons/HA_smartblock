- alias: Roomba - Run Basement Roomba Weekdays
  id: roomba_run_basement_roomba_weekdays
  triggers:
  - trigger: time
    at: 09:30:00
  conditions:
  - condition: state
    entity_id: input_boolean.disable_roomba
    state: 'off'
  - condition: state
    entity_id: input_boolean.basement_roomba_ran
    state: 'off'
  - condition: time
    weekday:
    - mon
    - wed
    - fri
  - condition: state
    entity_id: vacuum.basement_roomba
    state: docked
  - condition: state
    entity_id: binary_sensor.basement_drain_water_sensor_liquid_detected
    state: 'off'
  - condition: numeric_state
    entity_id: sensor.basement_roomba_battery_level
    above: 99
  - condition: state
    entity_id: input_boolean.vacation_mode
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.washer
      state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.dryer
      state: 'on'
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  actions:
  - action: vacuum.start
    target:
      entity_id:
      - vacuum.basement_roomba
