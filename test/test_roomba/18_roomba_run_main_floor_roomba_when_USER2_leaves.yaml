- alias: Roomba - Run Main Floor Roomba when USER2 Leaves
  id: roomba_run_main_floor_roomba_when_USER2_leaves
  triggers:
  - trigger: state
    entity_id: person.USER2
    from: home
    to: not_home
    for:
      hours: 0
      minutes: 5
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_home_away
    state: 'off'
  - condition: state
    entity_id: input_boolean.main_floor_roomba_ran
    state: 'off'
  - condition: state
    entity_id: input_boolean.disable_roomba
    state: 'off'
  - condition: time
    after: '10:01:00'
    before: '18:00:00'
  - condition: state
    entity_id: vacuum.main_floor_roomba
    state: docked
  - condition: numeric_state
    entity_id: sensor.main_floor_roomba_battery
    above: 99
  - condition: state
    entity_id: input_boolean.USER1_away
    state: 'off'
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  actions:
  - action: vacuum.start
    target:
      entity_id:
      - vacuum.main_floor_roomba
