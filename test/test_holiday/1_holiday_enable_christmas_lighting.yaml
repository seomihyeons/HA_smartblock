- alias: Holiday - Enable Christmas Lighting
  id: 'holiday_enable_christmas_lighting'

  triggers:
    - trigger: state
      entity_id: calendar.holiday
      to: 'on'
      for:
        hours: 9
        minutes: 0
        seconds: 0

  conditions:
    - condition: or
      conditions:
        - condition: state
          entity_id: sensor.holidays_calendar
          state: 'Christmas Eve'
        - condition: state
          entity_id: sensor.holidays_calendar
          state: 'Christmas Day'

  actions:
    - action: input_select.select_option
      data:
        entity_id: input_select.holiday
        option: 'Christmas'
