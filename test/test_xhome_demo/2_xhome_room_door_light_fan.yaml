- alias: xHome - Room Door Open Light and Fan
  id: xhome_room_door_light_fan

  triggers:
    - trigger: state
      entity_id: binary_sensor.door_reed_room
      from: 'off'
      to: 'on'

  actions:
    - action: light.turn_on
      target:
        entity_id: light.room_light

    - action: fan.turn_on
      target:
        entity_id: fan.room_fan
