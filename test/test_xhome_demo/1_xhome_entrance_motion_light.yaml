- alias: xHome - Entrance Motion Light
  id: xhome_entrance_motion_light

  triggers:
    - trigger: state
      entity_id: binary_sensor.pir_entrance
      from: 'off'
      to: 'on'

  actions:
    - action: light.turn_on
      target:
        entity_id: light.entrance_light

    - delay: "00:02:00"

    - action: light.turn_off
      target:
        entity_id: light.entrance_light
