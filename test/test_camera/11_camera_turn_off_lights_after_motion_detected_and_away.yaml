- alias: Camera - Turn Off Lights After Motion Detected and Away
  id: camera_turn_off_lights_after_motion_detected_and_away
  triggers:
  - trigger: state
    entity_id: binary_sensor.front_door_camera_person_detected
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 16
      seconds: 0
  - trigger: state
    entity_id: binary_sensor.front_porch_person_detected
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 16
      seconds: 0
  - trigger: state
    entity_id: binary_sensor.front_yard_camera_person_detected
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 16
      seconds: 0
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_doorbell
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: group.household
      state: home
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_lights
    data:
      transition: 900
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_sink
  - action: light.turn_on
    target:
      entity_id:
      - light.back_door
    data:
      brightness_pct: 1
  - action: light.turn_on
    target:
      entity_id:
      - light.garage_light
    data:
      brightness_pct: 1
