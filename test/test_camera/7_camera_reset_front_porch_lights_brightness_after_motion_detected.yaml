- alias: Camera - Reset Front Porch Lights Brightness After Motion Detected
  id: camera_reset_front_porch_lights_brightness_after_motion_detected
  triggers:
  - trigger: state
    entity_id: binary_sensor.front_door_camera_person_detected
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  - trigger: state
    entity_id: binary_sensor.front_porch_person_detected
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  - trigger: state
    entity_id: binary_sensor.front_yard_camera_person_detected
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_doorbell
    state: 'off'
  - condition: state
    entity_id: light.front_porch
    state: 'on'
    for:
      hours: 0
      minutes: 30
      seconds: 0
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.front_porch
    data:
      brightness_pct: 50
      transition: 900
