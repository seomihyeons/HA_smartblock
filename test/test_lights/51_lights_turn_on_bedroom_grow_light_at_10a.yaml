- alias: Lights - Turn On Bedroom Grow Light at 10a
  id: lights_turn_on_bedroom_grow_light_at_10a
  triggers:
  - trigger: time
    at: '10:05:00'
  conditions:
  - condition: state
    entity_id: input_boolean.vacation_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.disable_bedroom_grow_light
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.season
      state: summer
  - condition: not
    conditions:
    - condition: state
      entity_id: person.USER2
      state: home
  actions:
  - action: light.turn_on
    target:
      entity_id: light.closet_lamp
    data:
      brightness_pct: 100
      effect: Plantgrowth
  - delay:
      seconds: 30
  - action: light.turn_on
    target:
      entity_id: light.closet_lamp
    data:
      brightness_pct: 100
      effect: Plantgrowth
