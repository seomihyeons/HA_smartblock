- alias: Lights - Turn On Backyard Lighting at Sunset
  id: lights_turn_on_backyard_lighting_at_sunset
  triggers:
  - trigger: sun
    event: sunset
    offset: -00:15:00
  conditions:
  - condition: state
    entity_id: input_boolean.disable_exterior_on_sunset
    state: 'off'
  - condition: state
    entity_id: input_boolean.vacation_mode
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  actions:
  - action: switch.turn_on
    target:
      entity_id:
      - switch.backyard_patio_lighting
      - switch.lower_backyard_lighting
  - action: light.turn_on
    target:
      entity_id:
      - light.backyard_patio
    data:
      brightness_pct: 10
      color_temp: 370
  - action: light.turn_on
    target:
      entity_id:
      - light.backyard_deck
    data:
      brightness_pct: 2
