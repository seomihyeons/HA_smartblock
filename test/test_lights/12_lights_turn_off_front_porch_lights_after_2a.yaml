- alias: Lights - Turn Off Front Porch Lights After 2a
  id: lights_turn_off_front_porch_lights_after_2a
  triggers:
  - trigger: state
    entity_id: light.front_porch
    from: 'off'
    to: 'on'
    for:
      hours: 1
      minutes: 0
      seconds: 0
  conditions:
  - condition: time
    after: 00:00:00
    before: 07:30:00
  - condition: state
    entity_id: input_boolean.disable_exterior_off_night
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.front_porch
    data:
      transition: 300
  - delay: 00:06:00
  - action: light.turn_off
    target:
      entity_id:
      - light.front_porch
