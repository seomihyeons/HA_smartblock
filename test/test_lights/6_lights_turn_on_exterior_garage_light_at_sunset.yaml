- alias: Lights - Turn On Exterior Garage Light at Sunset
  id: lights_turn_on_exterior_garage_light_at_sunset
  triggers:
  - trigger: sun
    event: sunset
    offset: -00:15:00
  conditions:
  - condition: state
    entity_id: input_boolean.disable_exterior_on_sunset
    state: 'off'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.garage_light
    data:
      brightness_pct: 2
