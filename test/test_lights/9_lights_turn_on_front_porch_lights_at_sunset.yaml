- alias: Lights - Turn On Front Porch Lights at Sunset
  id: lights_turn_on_front_porch_lights_at_sunset
  triggers:
  - trigger: sun
    event: sunset
    offset: -00:15:00
  conditions:
  - condition: state
    entity_id: input_boolean.disable_exterior_on_sunset
    state: 'off'
  - condition: state
    entity_id: input_select.holiday
    state: None
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.front_porch
    data:
      transition: 900
      brightness_pct: 50
      color_temp: 370
