- alias: Lights - Basement Lights Off Pico Remote
  id: lights_basement_lights_off_pico_remote
  triggers:
  - trigger: event
    event_type: lutron_caseta_button_event
    event_data:
      serial: 42010030
      button_number: 4
      action: press
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.basement_lighting
  - delay:
      seconds: 1
