- alias: Lights - Turn Off Back Door Lights at Midnight
  id: lights_turn_off_back_door_lights_at_midnight
  triggers:
  - trigger: time
    at: 00:00:00
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_exterior_off_night
    state: 'off'
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.back_door
  - delay: 00:00:30
  - action: light.turn_off
    target:
      entity_id:
      - light.back_door
