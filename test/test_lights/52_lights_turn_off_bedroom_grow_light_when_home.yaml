- alias: Lights - Turn Off Bedroom Grow Light When Home
  id: lights_turn_off_bedroom_grow_light_when_home
  triggers:
  - trigger: state
    entity_id: person.USER2
    from: not_home
    to: home
  - trigger: state
    entity_id: group.household
    from: not_home
    to: home
  conditions:
  - condition: state
    entity_id: light.closet_lamp
    state: 'on'
  - condition: state
    entity_id: person.USER2
    state: home
  - condition: state
    entity_id: input_boolean.disable_bedroom_grow_light
    state: 'off'
  - condition: state
    entity_id: light.closet_lamp
    attribute: effect
    state: Plantgrowth
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.season
      state: summer
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.closet_lamp
