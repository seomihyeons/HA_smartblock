- alias: Lights - Turn On Bedroom Grow Light at Sunrise Vacation Mode
  id: lights_turn_on_bedroom_grow_light_at_sunrise_vacation_mode
  triggers:
  - trigger: sun
    event: sunrise
    offset: +00:46:00
  conditions:
  - condition: state
    entity_id: light.closet_lamp
    state: 'off'
  - condition: state
    entity_id: group.household
    state: not_home
  - condition: state
    entity_id: input_boolean.vacation_mode
    state: 'on'
  - condition: state
    entity_id: input_boolean.disable_bedroom_grow_light
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.season
      state: summer
  actions:
  - action: light.turn_on
    target:
      entity_id: light.closet_lamp
    data:
      brightness_pct: 100
      effect: Plantgrowth
  - delay:
      seconds: 30
  - action: light.turn_on
    target:
      entity_id: light.closet_lamp
    data:
      brightness_pct: 100
      effect: Plantgrowth
