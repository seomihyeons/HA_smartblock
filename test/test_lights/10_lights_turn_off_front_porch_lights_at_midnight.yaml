- alias: Lights - Turn Off Front Porch Lights at Midnight
  id: lights_turn_off_front_porch_lights_at_midnight
  triggers:
  - trigger: time
    at: '23:45:00'
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_exterior_off_night
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.holiday
      state: Christmas
  - condition: not
    conditions:
    - condition: state
      entity_id: input_select.holiday
      state: New Year's Eve
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.front_porch
    data:
      transition: 900
  - delay: 00:16:00
  - action: light.turn_off
    target:
      entity_id:
      - light.front_porch
