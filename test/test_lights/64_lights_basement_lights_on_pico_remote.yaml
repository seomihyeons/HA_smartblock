- alias: Lights - Basement Lights On Pico Remote
  id: lights_basement_lights_on_pico_remote
  triggers:
  - trigger: event
    event_type: lutron_caseta_button_event
    event_data:
      serial: 42010030
      button_number: 2
      action: press
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.basement_stairs
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.basement_lights
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.work_bench_light
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.laundry_room_light
  - action: light.turn_on
    target:
      entity_id:
      - light.basement_lamp
    data:
      brightness_pct: 100
  - delay:
      seconds: 1
