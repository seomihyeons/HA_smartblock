- alias: System - Home Showing Mode On
  id: system_home_showing_mode_on
  triggers:
  - trigger: state
    entity_id: input_boolean.home_showing_mode
    from: 'off'
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 30
  actions:
  - action: script.home_showing_mode_on
    data: {}
