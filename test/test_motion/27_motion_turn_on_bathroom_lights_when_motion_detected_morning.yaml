- alias: Motion - Turn On Bathroom Lights when Motion Detected Morning
  id: motion_turn_on_bathroom_lights_when_motion_detected_morning
  triggers:
  - trigger: state
    entity_id: binary_sensor.bathroom_motion
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.bathroom_lights
    state: 'off'
  - condition: time
    after: 05:45:00
    before: 09:00:00
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.bathroom_vanity
    data:
      brightness_pct: 50
      transition: 60
  - action: light.turn_on
    target:
      entity_id:
      - light.bathroom_shower
    data:
      brightness_pct: 25
      transition: 60
