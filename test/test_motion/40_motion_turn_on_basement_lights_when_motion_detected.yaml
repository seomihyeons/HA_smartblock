- alias: Motion - Turn On Basement Lights when Motion Detected
  id: motion_turn_on_basement_lights_when_motion_detected
  triggers:
  - trigger: state
    entity_id: binary_sensor.basement_motion
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: or
    conditions:
    - condition: state
      entity_id: light.basement_stairs
      state: 'off'
    - condition: state
      entity_id: light.basement_lights
      state: 'off'
    - condition: state
      entity_id: light.work_bench_light
      state: 'off'
    - condition: state
      entity_id: light.laundry_room_light
      state: 'off'
    - condition: state
      entity_id: light.basement_lamp
      state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.basement_stairs
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.basement_lights
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.work_bench_light
    data:
      brightness_pct: 25
  - action: light.turn_on
    target:
      entity_id:
      - light.laundry_room_light
  - action: light.turn_on
    target:
      entity_id:
      - light.basement_lamp
    data:
      brightness_pct: 100
