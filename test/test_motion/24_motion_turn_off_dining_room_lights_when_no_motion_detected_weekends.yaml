- alias: Motion - Turn Off Dining Room Lights when No Motion Detected Weekends
  id: motion_turn_off_dining_room_lights_when_no_motion_detected_weekends
  triggers:
  - trigger: state
    entity_id: binary_sensor.dining_room_motion
    from: 'on'
    to: 'off'
    for:
      hours: 1
      minutes: 0
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.dining_room_lights
    state: 'on'
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: time
    after: '22:00:00'
    before: 07:00:00
  - condition: time
    weekday:
    - fri
    - sat
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: returning
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.dining_room_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.hallway_light
