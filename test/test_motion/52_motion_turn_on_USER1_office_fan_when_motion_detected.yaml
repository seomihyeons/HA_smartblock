- alias: Motion - Turn On USER1 Office Fan when Motion Detected
  id: motion_turn_on_USER1_office_fan_when_motion_detected
  triggers:
  - trigger: state
    entity_id: binary_sensor.USER1s_office_motion
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: person.USER1
    state: home
  - condition: state
    entity_id: fan.USER1s_office_fan
    state: 'off'
  - condition: state
    entity_id: switch.USER1s_office_air_purifier
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.upstairs_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.upstairs_roomba
      state: returning
  - condition: state
    entity_id: input_boolean.USER1_office_guest
    state: 'off'
  actions:
  - action: fan.turn_on
    target:
      entity_id:
      - fan.USER1s_office_fan
  - delay: 00:00:01
  - action: fan.set_preset_mode
    target:
      entity_id: fan.USER1s_office_fan
    data:
      preset_mode: Auto
  - action: climate.set_hvac_mode
    data:
      entity_id:
      - climate.office_fan
      hvac_mode: cool
  - delay: 00:00:01
  - action: fan.oscillate
    data:
      entity_id:
      - fan.USER1s_office_fan
      oscillating: 'true'
  - action: switch.turn_on
    target:
      entity_id:
      - switch.USER1s_office_air_purifier
