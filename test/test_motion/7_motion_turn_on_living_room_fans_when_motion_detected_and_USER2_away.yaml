- alias: Motion - Turn On Living Room Fans when Motion Detected and USER2 Away
  id: motion_turn_on_living_room_fans_when_motion_detected_and_USER2_away
  triggers:
  - trigger: state
    entity_id: binary_sensor.living_room_motion
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: person.USER1
    state: home
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: returning
  - condition: state
    entity_id: fan.living_room_fans
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: person.USER2
      state: home
  actions:
  - action: fan.turn_on
    target:
      entity_id:
      - fan.living_room_east
      - fan.living_room_west
