- alias: Motion - Turn Off Living Room Lights when No Motion Detected
  id: motion_turn_off_living_room_lights_when_no_motion_detected
  triggers:
  - trigger: state
    entity_id: binary_sensor.living_room_motion
    from: 'on'
    to: 'off'
    for:
      hours: 2
      minutes: 0
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: input_boolean.living_room_guest
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.living_room_lights
    state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: returning
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_lights
