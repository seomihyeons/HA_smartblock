- alias: Motion - Turn On Stair Lights when Motion Detected Daytime
  id: motion_turn_on_stair_lights_when_motion_detected_daytime
  triggers:
  - trigger: state
    entity_id: binary_sensor.stairs_motion
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: light.stairs_light
    state: 'off'
  - condition: state
    entity_id: sun.sun
    state: above_horizon
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.stairs_light_level
      below: 15
    - condition: state
      entity_id: sensor.stairs_light_level
      state: unknown
  - condition: state
    entity_id: group.household
    state: home
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.stairs_light
    data:
      brightness_pct: 15
