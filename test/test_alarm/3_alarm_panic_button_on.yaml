- alias: Alarm - Panic Button On
  id: 'alarm_panic_button_on'

  triggers:
    - trigger: state
      entity_id: switch.panic_mode
      to: 'on'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs
      data:
       brightness_pct: 100
       color_name: "red"
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs_exterior
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.lutron_lights
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.lutron_lights_exterior
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs
      data:
       flash: long
    - action: switch.turn_on
      target:
        entity_id:
          - switch.siren
    - action: notify.USER1_devices
      data:
        message: Panic Button Has Been Pressed!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: notify.USER2_devices
      data:
        message: Panic Button Has Been Pressed!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
