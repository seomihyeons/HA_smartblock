- alias: Fountain - Turn On Daily
  id: 'fountain_turn_on_daily'

  triggers:
   - trigger: time
     at: '10:00:00'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_fountain
      state: 'off'
    - condition: state
      entity_id: switch.fountain
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: numeric_state
      entity_id: sensor.REDACTED_temperature
      above: 39
    - condition: not
      conditions:
      - condition: state
        entity_id: weather.REDACTED
        state: 'rainy'
    - condition: not
      conditions:
      - condition: state
        entity_id: weather.REDACTED
        state: 'lightning-rainy'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.season
        state: 'winter'

  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.fountain
