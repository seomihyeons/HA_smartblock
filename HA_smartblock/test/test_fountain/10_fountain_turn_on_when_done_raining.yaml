- alias: Fountain - Turn On When Done Raining
  id: 'fountain_turn_on_when_done_raining'

  triggers:
    - trigger: state
      entity_id: weather.REDACTED
      from: 'rainy'
      for:
        hours: 1
        minutes: 0
        seconds: 0
    - trigger: state
      entity_id: weather.REDACTED
      from: 'lightning-rainy'
      for:
        hours: 1
        minutes: 0
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_fountain
      state: 'off'
    - condition: state
      entity_id: switch.fountain
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: time
      after: '12:00:00'
      before: '23:59:00'
    - condition: numeric_state
      entity_id: sensor.REDACTED_temperature
      above: 39
    - condition: not
      conditions:
      - condition: state
        entity_id: weather.REDACTED
        state: 'rainy'
    - condition: not
      conditions:
      - condition: state
        entity_id: weather.REDACTED
        state: 'lightning-rainy'
    - condition: not
      conditions:
      - condition: state
        entity_id: sensor.season
        state: 'winter'

  actions:
    - action: switch.turn_on
      target:
        entity_id:
          - switch.fountain
