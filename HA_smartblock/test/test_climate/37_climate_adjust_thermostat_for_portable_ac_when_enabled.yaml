- alias: Climate - Adjust Thermostat for Portable when Enabled
  id: climate_adjust_thermostat_for_portable_ac_when_enabled
  triggers:
  - trigger: state
    entity_id: input_boolean.USER2_office_portable_ac
    to: 'on'
  - trigger: state
    entity_id: input_boolean.USER1_office_portable_ac
    to: 'on'
  - trigger: state
    entity_id: input_boolean.guest_bedroom_portable_ac
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.USER1_office_portable_ac
    state: 'on'
  - condition: state
    entity_id: input_boolean.USER2_office_portable_ac
    state: 'on'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: input_boolean.disable_climate
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.season
      state: winter
  - condition: not
    conditions:
    - condition: state
      entity_id: climate.main_floor
      state: heat
  - condition: not
    conditions:
    - condition: state
      entity_id: climate.main_floor
      state: 'off'
  actions:
  - action: climate.set_preset_mode
    data:
      entity_id: climate.main_floor
      preset_mode: Downstairs
