- alias: Camera - Reset Front Porch Lights Brightness After Ring
  id: camera_reset_front_porch_lights_brightness_after_ring
  triggers:
  - trigger: state
    entity_id: binary_sensor.front_door_camera_doorbell
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_doorbell
    state: 'off'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.front_porch
    data:
      brightness_pct: 50
      transition: 900
