- alias: Bedtime - Blinds
  id: 'bedtime_blinds'

  triggers:
    - trigger: state
      entity_id: input_boolean.bedtime
      to: 'on'
      for:
        hours: 0
        minutes: 2
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_blinds
      state: 'off'
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: or
      conditions:
      - condition: state
        entity_id: cover.kitchen_blinds
        state: 'open'
      - condition: state
        entity_id: cover.bedroom_closet_blinds
        state: 'open'
      - condition: state
        entity_id: cover.stairs_blinds
        state: 'open'

  actions:
    - action: cover.close_cover
      target:
        entity_id:
          - cover.stairs_blinds
    - action: cover.close_cover
      target:
        entity_id:
          - cover.bedroom_closet_blinds
    - action: cover.close_cover
      target:
        entity_id:
          - cover.kitchen_blinds
