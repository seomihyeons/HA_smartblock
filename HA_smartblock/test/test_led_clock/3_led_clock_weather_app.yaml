- alias: LED Clock - Weather App
  id: led_clock_weather_app
  triggers:
  - trigger: time_pattern
    minutes: /30
  - trigger: state
    entity_id: weather.REDACTED
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/weather
      payload: '{  "icon": "weather_{{ states("sensor.weather_condition_lcd_clock_icon")
        |regex_replace(find=''-'', replace=''_'', ignorecase=False) }}", "pushIcon":
        0, "text": "{{ states("sensor.weather_condition_human_readable") }}" }'
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/weather
      payload: '{  "icon": "weather_{{ states("sensor.weather_condition_lcd_clock_icon")
        |regex_replace(find=''-'', replace=''_'', ignorecase=False) }}", "pushIcon":
        0, "text": "{{ states("sensor.weather_condition_human_readable") }}" }'
