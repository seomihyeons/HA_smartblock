- alias: LED Clock - MK4S Print Time Remaining App
  id: led_clock_mk4s_print_time_remaining_app
  triggers:
  - trigger: state
    entity_id: sensor.prusa_mk4s_progress
  conditions:
  - condition: state
    entity_id: sensor.prusa_mk4s
    state: printing
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/mk4s_time_remaining
      payload: '{  "icon": "clock", "pushIcon": 2, "color": [255,98,0], "repeat":
        3, "text": "MK4: {{ relative_time(now() - timedelta( seconds = as_timestamp(states(''sensor.prusa_mk4s_print_finish''))
        - as_timestamp(now()))) }}" }'
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/mk4s_time_remaining
      payload: '{  "icon": "clock", "pushIcon": 2, "color": [255,98,0], "repeat":
        3, "text": "MK4: {{ relative_time(now() - timedelta( seconds = as_timestamp(states(''sensor.prusa_mk4s_print_finish''))
        - as_timestamp(now()))) }}" }'
