- alias: LED Clock - Easter App
  id: led_clock_easter_day_app
  triggers:
  - trigger: time
    at: 09:30:00
  - trigger: state
    entity_id: input_select.holiday
    to: Easter
  conditions:
  - condition: state
    entity_id: input_select.holiday
    state: Easter
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/holiday
      payload: '{  "icon": "easter", "pushIcon": 0, "repeat": 3, "color": [173,216,230],
        "text": "Happy Easter" }'
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/holiday
      payload: '{  "icon": "easter", "pushIcon": 0, "repeat": 3, "color": [173,216,230],
        "text": "Happy Easter" }'
