- alias: LED Clock - Turn On Living Room when Motion Detected
  id: led_clock_turn_on_living_room_when_motion_detected
  triggers:
  - trigger: state
    entity_id: binary_sensor.living_room_motion
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: input_boolean.living_room_guest
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.living_room_clock
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: returning
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      state: playing
  actions:
  - action: light.turn_on
    entity_id:
    - light.living_room_clock
