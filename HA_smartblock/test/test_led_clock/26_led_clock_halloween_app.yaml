- alias: LED Clock - Halloween App
  id: led_clock_halloween_app
  triggers:
  - trigger: time
    at: 09:30:00
  - trigger: state
    entity_id: input_select.holiday
    to: Halloween
  conditions:
  - condition: state
    entity_id: input_select.holiday
    state: Halloween
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/holiday
      payload: "{  \"icon\": \"pumpkin\", \"pushIcon\": 0, \"repeat\": 3, \"text\"\
        : [\n  {\n    \"t\": \"Happy \",\n    \"c\": \"FFA500\"\n  },\n  {\n    \"\
        t\": \"Halloween\",\n    \"c\": \"A020F0\"\n  }\n] }"
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/holiday
      payload: "{  \"icon\": \"pumpkin\", \"pushIcon\": 0, \"repeat\": 3, \"text\"\
        : [\n  {\n    \"t\": \"Happy \",\n    \"c\": \"FFA500\"\n  },\n  {\n    \"\
        t\": \"Halloween\",\n    \"c\": \"A020F0\"\n  }\n] }"
