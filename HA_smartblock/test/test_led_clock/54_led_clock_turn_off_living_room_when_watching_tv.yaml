- alias: LED Clock - urn Off Living Room LED Clock when Watching TV
  id: led_clock_turn_off_living_room_when_watching_tv
  triggers:
  - trigger: state
    entity_id: media_player.living_room_apple_tv
    to: playing
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_media_lights
    state: 'off'
  - condition: state
    entity_id: light.living_room_clock
    state: 'on'
  - condition: state
    entity_id: input_boolean.livingroom_rainbow
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: media_content_type
      state: music
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: app_id
      state: com.google.ios.youtube
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: app_name
      state: YouTube
  actions:
  - action: light.turn_off
    entity_id:
    - light.living_room_clock
