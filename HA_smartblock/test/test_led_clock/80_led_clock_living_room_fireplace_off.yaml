- alias: LED Clock - Living Room Fireplace Off
  id: led_clock_living_room_fireplace_off
  triggers:
  - trigger: state
    entity_id: switch.fireplace
    to: 'off'
  conditions:
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.living_room_clock
    state: 'on'
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/notify
      payload: '{  "icon": "fire_2", "pushIcon": 0, "duration": 30, "color": [255,98,0],
        "stack": false, "text": "Fireplace Off" }'
