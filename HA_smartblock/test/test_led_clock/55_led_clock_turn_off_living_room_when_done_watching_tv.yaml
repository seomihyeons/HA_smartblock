- alias: LED Clock - urn Off Living Room Clock when Done Watching TV
  id: led_clock_turn_off_living_room_when_done_watching_tv
  triggers:
  - trigger: state
    entity_id: media_player.living_room_apple_tv
    to: paused
    for:
      hours: 0
      minutes: 1
      seconds: 0
  - trigger: state
    entity_id: media_player.living_room_apple_tv
    to: idle
    for:
      hours: 0
      minutes: 1
      seconds: 0
  - trigger: state
    entity_id: media_player.living_room_apple_tv
    from: playing
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_media_lights
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.living_room_clock
    state: 'off'
  actions:
  - action: light.turn_on
    entity_id:
    - light.living_room_clock
