- alias: LED Clock - Dryer Done App
  id: led_clock_dryer_done_app
  triggers:
  - trigger: state
    entity_id: binary_sensor.dryer_dry_completed
    from: 'off'
    to: 'on'
    for:
      hours: 0
      minutes: 0
      seconds: 1
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/dryer
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/notify
      payload: '{  "icon": "dryer", "pushIcon": 0, "duration": 60, "color": [255,0,0],
        "text": "Dryer Finished" }'
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/dryer
  - action: mqtt.publish
    data:
      topic: living_room_clock/notify
      payload: '{  "icon": "dryer", "pushIcon": 0, "duration": 60, "color": [255,0,0],
        "text": "Dryer Finished" }'
