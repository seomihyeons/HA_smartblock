- alias: LED Clock - Living Room Album Title Apple TV
  id: led_clock_living_room_album_title_apple_tv
  triggers:
  - trigger: state
    entity_id: media_player.living_room_apple_tv
    attribute: media_title
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions:
  - condition: state
    entity_id: media_player.living_room_apple_tv
    state: playing
  - condition: state
    entity_id: media_player.living_room_apple_tv
    attribute: media_content_type
    state: music
  - condition: not
    conditions:
    - condition: state
      entity_id: select.living_room_tv_activities
      state: power_off
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/music_album
      payload: '{  "icon": "album", "pushIcon": 2, "repeat": 3, "rainbow": true, "text":
        "Artist: {{ state_attr(''media_player.living_room_apple_tv'', ''media_artist'')
        }} - Album: {{ state_attr(''media_player.living_room_apple_tv'', ''media_album_name'')
        }}" }'
