- alias: LED Clock - Package App Clear
  id: led_clock_package_app_clear
  triggers:
  - trigger: state
    entity_id: input_boolean.package_camera_notification
    to: 'off'
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/package
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/package
