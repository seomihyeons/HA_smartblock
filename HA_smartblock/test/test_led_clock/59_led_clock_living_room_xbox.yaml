- alias: LED Clock - Living Room Xbox
  id: led_clock_living_room_xbox
  triggers:
  - trigger: state
    entity_id: select.living_room_tv_activities
    to: Play Xbox
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/tv_state
  - action: mqtt.publish
    data:
      topic: living_room_clock/notify
      payload: '{  "icon": "xbox", "pushIcon": 0, "duration": 30, "color": [0,255,0],
        "stack": false, "text": "Xbox" }'
  - delay: 00:00:20
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/tv_state
      payload: '{  "icon": "xbox", "pushIcon": 0, "repeat": 3, "color": [0,255,0],
        "text": "Xbox" }'
