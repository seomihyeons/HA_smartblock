- alias: LED Clock - Living Room USER2 Left
  id: led_clock_living_room_USER2_left_work
  triggers:
  - trigger: state
    entity_id: person.USER2
    from: Work
    to: not_home
  conditions:
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.living_room_clock
    state: 'on'
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/notify
      payload: '{  "icon": "cars", "pushIcon": 0, "duration": 60, "text": "USER2 ETA:
        {{states(''sensor.USER2_to_home'')}} mins" }'
