- alias: LED Clock - MK3.5 Print Time Remaining App
  id: led_clock_mk3_5_print_time_remaining_app
  triggers:
  - trigger: state
    entity_id: sensor.prusa_mk3_5_progress
  conditions:
  - condition: state
    entity_id: sensor.prusa_mk3_5
    state: printing
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/mk3_5_time_remaining
      payload: '{  "icon": "clock", "pushIcon": 2, "color": [255,98,0], "repeat":
        3, "text": "MK3: {{ relative_time(now() - timedelta( seconds = as_timestamp(states(''sensor.prusa_mk3_5_print_finish''))
        - as_timestamp(now()))) }}" }'
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/mk3_5_time_remaining
      payload: '{  "icon": "clock", "pushIcon": 2, "color": [255,98,0], "repeat":
        3, "text": "MK3: {{ relative_time(now() - timedelta( seconds = as_timestamp(states(''sensor.prusa_mk3_5_print_finish''))
        - as_timestamp(now()))) }}" }'
