- alias: LED Clock - Living Room Media Title
  id: led_clock_living_room_media_title
  triggers:
  - trigger: state
    entity_id: media_player.living_room_apple_tv
    attribute: media_title
    for:
      hours: 0
      minutes: 0
      seconds: 1
  conditions:
  - condition: state
    entity_id: light.living_room_clock
    state: 'on'
  - condition: state
    entity_id: media_player.living_room_apple_tv
    state: playing
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: media_content_type
      state: music
  - condition: not
    conditions:
    - condition: state
      entity_id: media_player.living_room_apple_tv
      attribute: app_id
      state: com.google.ios.youtube
  actions:
  - action: mqtt.publish
    data:
      topic: living_room_clock/notify
      payload: '{  "icon": "movie", "pushIcon": 2, "duration": 60, "rainbow": false,
        "stack": false, "text": "{{ state_attr(''media_player.living_room_apple_tv'',
        ''media_title'') }}" }'
