- alias: LED Clock - Temperature App
  id: led_clock_temperature_app
  triggers:
  - trigger: time_pattern
    minutes: /30
  - trigger: state
    entity_id: sensor.REDACTED_temperature
  actions:
  - action: mqtt.publish
    data:
      topic: USER1_office_clock/custom/temperature
      payload: "{  \"icon\": \"{{ states(\"sensor.outdoor_temp_range\") }}\", \"pushIcon\"\
        : 0, \"text\": \"{{ states(\"sensor.REDACTED_temperature\") }}\xB0F\" }"
  - action: mqtt.publish
    data:
      topic: living_room_clock/custom/temperature
      payload: "{  \"icon\": \"{{ states(\"sensor.outdoor_temp_range\") }}\", \"pushIcon\"\
        : 0, \"text\": \"{{ states(\"sensor.REDACTED_temperature\") }}\xB0F\" }"
