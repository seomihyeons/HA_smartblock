- alias: Roomba - Run Upstairs Roomba when Away
  id: roomba_run_upstairs_roomba_when_away
  triggers:
  - trigger: state
    entity_id: group.household
    from: home
    to: not_home
    for:
      hours: 0
      minutes: 3
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_home_away
    state: 'off'
  - condition: state
    entity_id: input_boolean.disable_roomba
    state: 'off'
  - condition: state
    entity_id: input_boolean.upstairs_roomba_ran
    state: 'off'
  - condition: time
    after: 08:00:00
    before: '23:59:00'
  - condition: state
    entity_id: vacuum.upstairs_roomba
    state: docked
  - condition: numeric_state
    entity_id: sensor.upstairs_roomba_battery_level
    above: 99
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  actions:
  - action: vacuum.start
    target:
      entity_id:
      - vacuum.upstairs_roomba
