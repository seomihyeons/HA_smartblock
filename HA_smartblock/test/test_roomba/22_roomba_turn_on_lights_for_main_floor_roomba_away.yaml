- alias: Roomba - Turn On lights for Main Floor Roomba Away
  id: roomba_turn_on_lights_for_main_floor_roomba_away
  triggers:
  - trigger: state
    entity_id: vacuum.main_floor_roomba
    to: cleaning
    for:
      hours: 0
      minutes: 0
      seconds: 15
  conditions:
  - condition: state
    entity_id: input_boolean.disable_roomba
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: group.household
      state: home
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.roomba_clean_living_room_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.roomba_clean_dining_room_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.roomba_clean_kitchen_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.roomba_clean_hallway_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.roomba_clean_bathroom_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.roomba_clean_bedroom_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.roomba_clean_bedroom_closet_lights
    state: 'off'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.living_room_accent_lights
    data:
      brightness_pct: 100
      color_temp: 370
  - action: light.turn_on
    target:
      entity_id:
      - light.bedroom_lamps
      - light.bedroom_ceiling
      - light.bedroom_closet_ceiling
    data:
      brightness_pct: 100
      color_temp: 370
  - action: light.turn_on
    target:
      entity_id:
      - light.dining_room_table
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.bathroom_lights
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.kitchen_lights
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.hallway_light
    data:
      brightness_pct: 100
