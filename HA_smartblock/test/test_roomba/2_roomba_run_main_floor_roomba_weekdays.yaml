- alias: Roomba - Run Main Floor Roomba Weekdays
  id: roomba_run_main_floor_roomba_weekdays
  triggers:
  - trigger: time
    at: 09:30:00
  conditions:
  - condition: state
    entity_id: input_boolean.disable_roomba
    state: 'off'
  - condition: state
    entity_id: input_boolean.main_floor_roomba_ran
    state: 'off'
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
    - fri
  - condition: state
    entity_id: vacuum.main_floor_roomba
    state: docked
  - condition: numeric_state
    entity_id: sensor.main_floor_roomba_battery
    above: 99
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.vacation_mode
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: person.USER2
      state: home
  actions:
  - action: vacuum.start
    target:
      entity_id:
      - vacuum.main_floor_roomba
