- alias: Roomba - Turn Off Workbench Lights Room Clean
  id: roomba_turn_off_workbench_lights_room_clean
  triggers:
  - trigger: state
    entity_id: vacuum.basement_roomba
    to: docked
    for:
      hours: 0
      minutes: 5
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.roomba_clean_workbench_lights
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: light.basement_lights
      state: 'on'
    - condition: state
      entity_id: light.basement_lamp
      state: 'on'
    - condition: state
      entity_id: light.work_bench_light
      state: 'on'
    - condition: state
      entity_id: light.laundry_room_light
      state: 'on'
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.basement_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.basement_roomba
      state: returning
  - condition: state
    entity_id: binary_sensor.basement_motion
    state: 'off'
    for:
      minutes: 6
  - condition: time
    after: 08:30:00
    before: '23:00:00'
  actions:
  - action: homeassistant.turn_off
    target:
      entity_id:
      - input_boolean.roomba_clean_workbench_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.basement_lights
      - light.basement_lamp
      - light.work_bench_light
      - light.laundry_room_light
