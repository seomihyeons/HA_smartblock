- alias: 3D-Printer - MK4S Light Print Start
  id: 3d_printer_mk4s_light_print_start
  triggers:
  - trigger: state
    entity_id: sensor.prusa_mk4s
    to: printing
    for:
      hours: 0
      minutes: 0
      seconds: 5
  conditions:
  - condition: state
    entity_id: light.prusa_mk4s
    state: 'on'
  actions:
  - action: light.turn_on
    entity_id:
    - light.prusa_mk4s
    data:
      brightness_pct: 100
      color_name: blue
  - delay: 00:05:00
  - action: light.turn_on
    target:
      entity_id:
      - light.prusa_mk4s
    data:
      brightness_pct: 100
      effect: Daylight
