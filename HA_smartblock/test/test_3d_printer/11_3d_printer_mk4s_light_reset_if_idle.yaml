- alias: 3D-Printer - MK4S Light Reset if Idle
  id: 3d_printer_mk4s_light_reset_if_idle
  triggers:
  - trigger: state
    entity_id: sensor.prusa_mk4s
    to: idle
    for:
      hours: 0
      minutes: 1
      seconds: 0
  conditions:
  - condition: state
    entity_id: light.prusa_mk4s
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: sensor.prusa_mk4s
      state: idle
    - condition: state
      entity_id: sensor.prusa_mk4s
      state: printing
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.prusa_mk4s
    data:
      brightness_pct: 100
      effect: Daylight
