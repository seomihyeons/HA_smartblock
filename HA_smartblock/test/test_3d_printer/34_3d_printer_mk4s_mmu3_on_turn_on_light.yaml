- alias: 3D-Printer - MK4S MMU3 On Turn On Light
  id: 3d_printer_mk4s_mmu3_on_turn_on_light
  triggers:
  - trigger: state
    entity_id: switch.prusa_mk4s_mmu3
    to: 'on'
  conditions:
  - condition: state
    entity_id: light.prusa_mk4s_mmu3
    state: 'off'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.prusa_mk4s_mmu3
    data:
      brightness_pct: 100
      effect: Daylight
