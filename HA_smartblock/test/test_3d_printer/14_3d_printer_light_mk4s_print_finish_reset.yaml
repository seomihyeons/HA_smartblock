- alias: 3D-Printer - Light MK4S Print Finish Reset
  id: 3d_printer_light_mk4s_print_finish_reset
  triggers:
  - trigger: state
    entity_id: sensor.prusa_mk4s
    from: finished
    to: idle
  conditions:
  - condition: state
    entity_id: light.prusa_mk4s
    state: 'on'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.prusa_mk4s
    data:
      brightness_pct: 100
      effect: Daylight
