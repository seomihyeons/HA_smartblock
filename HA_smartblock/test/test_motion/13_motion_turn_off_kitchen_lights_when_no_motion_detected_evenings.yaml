- alias: Motion - Turn Off Kitchen Lights when No Motion Detected Evenings
  id: motion_turn_off_kitchen_lights_when_no_motion_detected_evenings
  triggers:
  - trigger: state
    entity_id: binary_sensor.kitchen_motion
    from: 'on'
    to: 'off'
    for:
      hours: 1
      minutes: 0
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.kitchen_lights
    state: 'on'
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: time
    after: 06:00:00
    before: '22:00:00'
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: returning
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_lights
