- alias: Motion - Turn On Dining Room Lights when Motion Detected Daytime
  id: motion_turn_on_dining_room_lights_when_motion_detected_daytime
  triggers:
  - trigger: state
    entity_id: binary_sensor.dining_room_motion
    from: 'off'
    to: 'on'
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: light.dining_room_lights
    state: 'off'
  - condition: state
    entity_id: sun.sun
    state: above_horizon
  - condition: or
    conditions:
    - condition: numeric_state
      entity_id: sensor.dining_room_light_level
      below: 25
    - condition: state
      entity_id: sensor.dining_room_light_level
      state: unknown
  - condition: state
    entity_id: group.household
    state: home
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.dining_room_table
    data:
      brightness_pct: 25
  - action: light.turn_on
    target:
      entity_id:
      - light.hallway_light
    data:
      brightness_pct: 25
