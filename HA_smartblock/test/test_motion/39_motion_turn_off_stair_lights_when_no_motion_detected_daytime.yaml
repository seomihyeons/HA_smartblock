- alias: Motion - Turn Off Stair Lights when No Motion Detected Daytime
  id: motion_turn_off_stair_lights_when_no_motion_detected_daytime
  triggers:
  - trigger: state
    entity_id: binary_sensor.stairs_motion
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: light.stairs_light
    state: 'on'
  - condition: state
    entity_id: sun.sun
    state: above_horizon
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.upstairs_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.upstairs_roomba
      state: returning
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.stairs_light
