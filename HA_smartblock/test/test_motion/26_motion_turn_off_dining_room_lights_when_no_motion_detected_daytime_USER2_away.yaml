- alias: Motion - Turn Off Dining Room Lights when No Motion Detected Daytime USER2
    Away
  id: motion_turn_off_dining_room_lights_when_no_motion_detected_daytime_USER2_away
  triggers:
  - trigger: state
    entity_id: binary_sensor.dining_room_motion
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 15
      seconds: 0
  conditions:
  - condition: state
    entity_id: input_boolean.disable_motion
    state: 'off'
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: person.USER1
    state: home
  - condition: state
    entity_id: light.dining_room_lights
    state: 'on'
  - condition: state
    entity_id: sun.sun
    state: above_horizon
  - condition: not
    conditions:
    - condition: state
      entity_id: person.USER2
      state: home
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: cleaning
    - condition: state
      entity_id: vacuum.main_floor_roomba
      state: returning
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.dining_room_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.hallway_light
