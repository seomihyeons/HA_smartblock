- alias: Lights - Turn On Back Door Lights at Sunset
  id: lights_turn_on_back_door_lights_at_sunset
  triggers:
  - trigger: sun
    event: sunset
    offset: -00:15:00
  conditions:
  - condition: state
    entity_id: input_boolean.disable_exterior_on_sunset
    state: 'off'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.back_door
    data:
      brightness_pct: 2
      transition: 60
