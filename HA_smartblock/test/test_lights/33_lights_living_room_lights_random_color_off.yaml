- alias: Lights - Living Room Lights Random Color Off
  id: lights_living_room_lights_random_color_off
  triggers:
  - trigger: state
    entity_id: input_boolean.livingroom_rainbow
    to: 'off'
  conditions:
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: input_boolean.bedtime
    state: 'off'
  - condition: state
    entity_id: light.living_room_lights
    state: 'on'
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.living_room_accent_lights
  - delay: 00:00:05
  - action: light.turn_on
    target:
      entity_id:
      - light.living_room_lamps
    data:
      transition: 15
      brightness_pct: 100
      color_temp: 370
  - action: light.turn_on
    entity_id: light.media_center_lighting
    data:
      transition: 15
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.globe
    data:
      transition: 15
      brightness_pct: 65
      color_temp: 366
