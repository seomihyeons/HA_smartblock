- alias: Lights - Turn Off Exterior Garage Light at Midnight Friends Visiting Weekdays
  id: lights_turn_off_exterior_garage_light_at_midnight_friends_visiting_weekdays
  triggers:
  - trigger: time
    at: 00:00:00
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_exterior_off_night
    state: 'off'
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'on'
  - condition: time
    weekday:
    - mon
    - tue
    - wed
    - thu
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.garage_light
