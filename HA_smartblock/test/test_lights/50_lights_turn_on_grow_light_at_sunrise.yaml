- alias: Lights - Turn On Grow Light at Sunrise
  id: lights_turn_on_grow_light_at_sunrise
  triggers:
  - trigger: sun
    event: sunrise
  conditions:
  - condition: state
    entity_id: switch.grow_light
    state: 'off'
  - condition: state
    entity_id: input_boolean.disable_grow_light
    state: 'off'
  actions:
  - action: switch.turn_on
    target:
      entity_id:
      - switch.grow_light
