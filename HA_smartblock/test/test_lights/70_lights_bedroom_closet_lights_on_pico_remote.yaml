- alias: Lights - Bedroom Closet Lights On Pico Remote
  id: lights_bedroom_closet_lights_on_pico_remote
  triggers:
  - trigger: event
    event_type: lutron_caseta_button_event
    event_data:
      serial: 92034753
      button_number: 2
      action: press
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.bedroom_closet_lights
    data:
      brightness_pct: 100
      color_temp: 370
