- alias: Lights - Living Room Lights On Pico Remote
  id: lights_living_room_lights_on_pico_remote
  triggers:
  - trigger: event
    event_type: lutron_caseta_button_event
    event_data:
      serial: 43846935
      button_number: 2
      action: press
  actions:
  - action: light.turn_on
    target:
      entity_id:
      - light.living_room_lamps
    data:
      brightness_pct: 100
      color_temp: 370
  - action: light.turn_on
    target:
      entity_id:
      - light.media_center_lighting
    data:
      brightness_pct: 100
  - action: light.turn_on
    target:
      entity_id:
      - light.globe
    data:
      brightness_pct: 65
  - delay:
      seconds: 1
