- alias: Lights - Turn Off Grow Light After 16 Hours
  id: lights_turn_off_grow_light_after_16_hours
  triggers:
  - trigger: sun
    event: sunrise
    offset: '+16:00:00'
  conditions:
  - condition: state
    entity_id: switch.grow_light
    state: 'on'
  - condition: state
    entity_id: input_boolean.disable_grow_light
    state: 'off'
  actions:
  - action: switch.turn_off
    target:
      entity_id:
      - switch.grow_light
