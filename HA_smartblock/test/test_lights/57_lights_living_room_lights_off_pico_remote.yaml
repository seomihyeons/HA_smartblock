- alias: Lights - Living Room Lights Off Pico Remote
  id: lights_living_room_lights_off_pico_remote
  triggers:
  - trigger: event
    event_type: lutron_caseta_button_event
    event_data:
      serial: 43846935
      button_number: 4
      action: press
  actions:
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_accent_lights
  - delay:
      seconds: 1
