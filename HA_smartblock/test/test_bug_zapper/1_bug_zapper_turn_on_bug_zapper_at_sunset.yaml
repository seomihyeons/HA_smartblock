- alias: Bug Zapper - Turn On Bug Zapper at Sunset
  id: bug_zapper_turn_on_bug_zapper_at_sunset
  triggers:
  - trigger: sun
    event: sunset
    offset: -00:30:00
  conditions:
  - condition: state
    entity_id: group.household
    state: home
  - condition: state
    entity_id: switch.bug_zapper
    state: 'off'
  - condition: not
    conditions:
    - condition: state
      entity_id: sensor.season
      state: winter
  actions:
  - action: switch.turn_on
    target:
      entity_id:
      - switch.bug_zapper
