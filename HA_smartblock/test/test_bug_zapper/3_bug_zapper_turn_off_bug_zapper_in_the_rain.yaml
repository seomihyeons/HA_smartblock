- alias: Bug Zapper - Turn Off Bug Zapper in the Rain
  id: bug_zapper_turn_off_bug_zapper_in_the_rain
  triggers:
  - trigger: state
    entity_id: weather.REDACTED
    to: rainy
    for:
      hours: 0
      minutes: 30
      seconds: 0
  - trigger: state
    entity_id: weather.REDACTED
    to: lightning-rainy
    for:
      hours: 0
      minutes: 30
      seconds: 0
  conditions:
  - condition: state
    entity_id: switch.bug_zapper
    state: 'on'
  actions:
  - action: switch.turn_off
    target:
      entity_id:
      - switch.bug_zapper
