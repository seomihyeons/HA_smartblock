- alias: Location - USER1 Home from Driving Unlock Door
  id: 'location_USER1_home_from_driving_unlock_door'

  triggers:
    - trigger: state
      entity_id: person.USER1
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_auto_garage
      state: 'off'
    - condition: state
      entity_id: input_boolean.disable_home_away
      state: 'off'
    - condition: state
      entity_id: input_boolean.USER1_away
      state: 'on'
    - condition: state
      entity_id: input_boolean.USER1_away_driving
      state: 'on'
    - condition: state
      entity_id: lock.back_door
      state: 'locked'

  actions:
    - action: lock.unlock
      target:
        entity_id: 
          - lock.back_door
          - lock.basement_door
