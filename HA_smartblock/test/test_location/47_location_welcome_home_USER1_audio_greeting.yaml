- alias: Location - Welcome Home USER1 Audio Greeting
  id: 'location_welcome_home_USER1_audio_greeting'

  triggers:
    - trigger: state
      entity_id: binary_sensor.doors
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: person.USER1
      state: 'home'
    - condition: state
      entity_id: input_boolean.USER1_greeting
      state: 'on'
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'
    - condition: time
      after: '09:00:00'
      before: '22:00:00'

  actions:
    - delay: '00:00:08'
    - action: media_player.play_media
      target:
        entity_id: 
          - media_player.sonos_living_room
          - media_player.sonos_kitchen
          - media_player.sonos_move
      data:
        announce: true
        media_content_id: >
          media-source://tts/cloud?message="Welcome home, USER1."
        media_content_type: "music"
        extra:
          volume: 45
    - delay: '00:00:30'
    - action: homeassistant.turn_off
      entity_id: input_boolean.USER1_greeting
