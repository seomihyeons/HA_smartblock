- alias: Location - USER2 Away iOS Notification
  id: 'location_USER2_away_ios_notification'

  triggers:
    - trigger: state
      entity_id: person.USER2
      from: 'home'
      to: 'not_home'

  conditions:
    - condition: state
      entity_id: input_boolean.disable_notifications
      state: 'off'

  actions:
    - action: notify.USER1_devices
      data:
        message: USER2 Away
        data:
          tag: USER2-location
