- alias: Location - USER2 Home Dim Garage Light after 16 Mins
  id: 'location_USER2_home_dim_garage_light_after_16_mins'

  triggers:
    - trigger: state
      entity_id: input_boolean.USER2_away
      from: 'on'
      to: 'off'
      for:
        hours: 0
        minutes: 6
        seconds: 0

  conditions:
    - condition: state
      entity_id: input_boolean.disable_home_away
      state: 'off'
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.garage_light
      data:
       brightness_pct: 2
