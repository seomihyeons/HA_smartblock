- alias: Location - USER1 Home Turn On Lights
  id: 'location_USER1_home_turn_on_lights'

  triggers:
    - trigger: state
      entity_id: person.USER1
      from: 'not_home'
      to: 'home'

  conditions:
    - condition: state
      entity_id: sun.sun
      state: 'below_horizon'
    - condition: state
      entity_id: input_boolean.disable_home_away
      state: 'off'
    - condition: state
      entity_id: input_boolean.USER1_away
      state: 'on'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.kitchen_sink
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.living_room_lamps
      data:
       color_temp: 370
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.dining_room_table
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.media_center_lighting
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.kitchen_cabinets
      data:
       brightness_pct: 2
    - action: light.turn_on
      target:
        entity_id:
          - light.hallway_light
      data:
       brightness_pct: 25
    - action: light.turn_on
      target:
        entity_id:
          - light.front_porch
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.back_door
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.garage_light
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.globe
      data:
       color_temp: 366
       brightness_pct: 65
