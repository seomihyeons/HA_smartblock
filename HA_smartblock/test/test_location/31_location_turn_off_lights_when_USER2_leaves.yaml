- alias: Location - Turn Off Lights when USER2 Leaves
  id: 'location_turn_off_lights_when_USER2_leaves'

  triggers:
    - trigger: state
      entity_id: person.USER2
      from: 'home'
      to: 'not_home'

  conditions:
    - condition: time
      after: '06:00:00'
      before: '07:30:00'
    - condition: state
      entity_id: input_boolean.disable_home_away
      state: 'off'
    - condition: time
      weekday:
        - mon
        - tue
        - wed
        - thu
        - fri
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'

  actions:
    - action: light.turn_off
      target:
        entity_id:
          - light.interior_lights
    - action: light.turn_off
      target:
        entity_id:
          - light.back_door
    - action: light.turn_off
      target:
        entity_id:
          - light.garage_light
    - delay: '00:00:30'
    - action: light.turn_off
      target:
        entity_id:
          - light.back_door
