- alias: Location - Set USER2 Away after 1 Min
  id: 'location_set_USER2_away_after_1_min'

  triggers:
    - trigger: state
      entity_id: person.USER2
      from: 'home'
      to: 'not_home'
      for:
        hours: 0
        minutes: 1
        seconds: 0

  actions:
    - action: homeassistant.turn_on
      target:
        entity_id:
          - input_boolean.USER2_away
          - input_boolean.USER2_greeting
