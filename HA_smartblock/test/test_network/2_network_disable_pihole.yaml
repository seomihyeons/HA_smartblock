- alias: Network - Disable Pi-hole
  id: network_disable_pihole
  triggers:
  - trigger: state
    entity_id: input_boolean.pihole
    from: 'on'
    to: 'off'
    for:
      hours: 0
      minutes: 0
      seconds: 3
  conditions:
  - condition: state
    entity_id: input_boolean.pihole
    state: 'off'
  actions:
  - action: script.pihole_disable
    data: {}
