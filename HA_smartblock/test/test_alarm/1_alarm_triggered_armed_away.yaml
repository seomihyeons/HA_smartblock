- alias: Alarm - Triggered Armed Away
  id: 'alarm_triggered_armed_away'

  triggers:
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'triggered'

  conditions:
    - condition: not
      conditions:
      - condition: state
        entity_id: group.household
        state: 'home'
    - condition: state
      entity_id: input_boolean.guest_mode
      state: 'off'
    - condition: not
      conditions:
      - condition: state
        entity_id: input_boolean.home_showing_mode
        state: 'on'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs
      data:
       brightness_pct: 100
       color_name: "red"
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs_exterior
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.lutron_lights
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.lutron_lights_exterior
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs
      data:
       flash: long
    - action: switch.turn_on
      target:
        entity_id:
          - switch.siren
    - action: media_player.play_media
      target:
        entity_id: 
          - media_player.sonos_living_room
          - media_player.sonos_dining_room
          - media_player.sonos_kitchen
          - media_player.sonos_bathroom
          - media_player.sonos_bedroom
          - media_player.sonos_bedroom_closet
          - media_player.sonos_USER1s_office
          - media_player.sonos_USER2s_office
          - media_player.sonos_move
          - media_player.sonos_fitness_room
          - media_player.sonos_craft_room
      data:
        announce: true
        media_content_id: >
          media-source://tts/cloud?message="You are not Authorized to be Here. Law Enforcement Has Been Notified!"
        media_content_type: "music"
        extra:
          volume: 90
    - action: notify.USER1_devices
      data:
        message: Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: notify.USER2_devices
      data:
        message: Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background

        ##########################################################
        ## Alarm Triggered Armed Home
        ##########################################################
