- alias: Alarm - Home Door Alarm
  id: 'alarm_home_door_alarm'

  triggers:
    - trigger: state
      entity_id: binary_sensor.doors
      from: 'off'
      to: 'on'

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: state
      entity_id: alarm_control_panel.alarm
      state: 'armed_home'
    - condition: not
      conditions:
      - condition: state
        entity_id: input_boolean.home_showing_mode
        state: 'on'

  actions:
    - action: notify.USER1_devices
      data:
        message: Door Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: notify.USER2_devices
      data:
        message: Door Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: alarm_control_panel.alarm_trigger
      target:
        entity_id:
          - alarm_control_panel.alarm
