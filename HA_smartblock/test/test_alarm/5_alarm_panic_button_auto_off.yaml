- alias: Alarm - Panic Button Auto Off
  id: 'alarm_panic_button_auto_off'

  triggers:
    - trigger: state
      entity_id: switch.panic_mode
      to: 'on'
      for:
        hours: 0
        minutes: 2
        seconds: 0

  actions:
    - action: switch.turn_off
      target:
        entity_id:
          - switch.siren

        ##########################################################
        ## Door Alarm Away
        ##########################################################
