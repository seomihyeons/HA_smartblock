- alias: Alarm - Triggered Armed Home
  id: 'alarm_triggered_armed_home'

  triggers:
    - trigger: state
      entity_id: alarm_control_panel.alarm
      to: 'triggered'

  conditions:
    - condition: state
      entity_id: group.household
      state: 'home'
    - condition: not
      conditions:
      - condition: state
        entity_id: input_boolean.home_showing_mode
        state: 'on'

  actions:
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs
      data:
       brightness_pct: 100
       color_name: "red"
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs_exterior
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.lutron_lights
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.lutron_lights_exterior
      data:
       brightness_pct: 100
    - action: light.turn_on
      target:
        entity_id:
          - light.smart_bulbs
      data:
       flash: long
    - action: switch.turn_on
      target:
        entity_id:
          - switch.siren
    - action: notify.USER1_devices
      data:
        message: Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background
    - action: notify.USER2_devices
      data:
        message: Alarm Triggered!
        data:
          push:
            sound:
              name: default
              critical: 1
              volume: 1.0
          tag: alarm
          entity_id:
           - camera.front_porch
          actions:
            - action: "disarm_alarm"
              title: "Disable Alarm System"
              destructive: true
              activationMode: background
            - action: "siren_off"
              title: "Siren Off"
              activationMode: background

        ##########################################################
        ## Panic Button On
        ##########################################################
