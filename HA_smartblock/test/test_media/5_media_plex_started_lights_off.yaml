- alias: Media - Plex Started Lights Off
  id: media_plex_started_lights_off
  triggers:
  - trigger: state
    entity_id: media_player.plex_living_room_appletv
    to: playing
    for:
      hours: 0
      minutes: 0
      seconds: 15
  conditions:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: input_boolean.disable_media_lights
    state: 'off'
  - condition: state
    entity_id: input_boolean.guest_mode
    state: 'off'
  - condition: state
    entity_id: input_boolean.living_room_guest
    state: 'off'
  actions:
  - action: homeassistant.turn_on
    entity_id: input_boolean.watching_plex
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_accent_lights
    data:
      transition: 10
  - action: light.turn_off
    target:
      entity_id:
      - light.dining_room_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.bathroom_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.hallway_light
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_ceiling_east
  - delay: 00:00:05
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_ceiling_west
  - delay: 00:00:15
  - action: light.turn_off
    target:
      entity_id:
      - light.living_room_accent_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.dining_room_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.kitchen_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.bathroom_lights
  - action: light.turn_off
    target:
      entity_id:
      - light.hallway_light
